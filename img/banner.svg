<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="55%" stop-color="#0f2027"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#14b8a6" stroke-width="0.5" opacity="0.15"/>
    </pattern>
  </defs>
  <rect width="1200" height="280" fill="url(#bg)"/>
  <rect width="1200" height="280" fill="url(#grid)"/>
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent)"/>
  <rect x="0" y="275" width="1200" height="5" fill="url(#accent)"/>

  <!-- terminal/shield mark -->
  <g transform="translate(150,140)">
    <rect x="-60" y="-60" width="120" height="120" rx="24" fill="#0d1b1e" stroke="url(#accent)" stroke-width="3"/>
    <text x="-38" y="12" font-family="Menlo, Consolas, monospace" font-size="42" fill="#2dd4bf">&gt;_</text>
  </g>

  <text x="270" y="128" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="64" font-weight="800" fill="#f3f4f6">ConnectHub</text>
  <text x="272" y="168" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" fill="#5eead4">Modern cross-platform SSH client</text>
  <text x="272" y="200" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" fill="#9ca3af">SSH &#8226; SFTP &#8226; SCP &#8226; Port Forwarding &#8226; Tunneling &#8226; VPN &#8226; Workspace Management</text>
</svg>
