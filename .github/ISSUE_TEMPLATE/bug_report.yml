name: Bug Report
description: Report something that isn't working as expected
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as you can.
        If this is a **security vulnerability**, please do not use this template — see [SECURITY.md](https://github.com/connecthub-client/ConnectHub/blob/main/SECURITY.md) instead.

  - type: input
    id: version
    attributes:
      label: ConnectHub version
      description: Settings → About, or the release you downloaded
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Linux
        - Windows
        - macOS
    validations:
      required: true

  - type: input
    id: os-details
    attributes:
      label: OS details
      description: Distro/version, or Windows/macOS version
      placeholder: "Ubuntu 24.04, Windows 11 23H2, macOS 14.5..."
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Terminal output, error messages, or screenshots. This will be automatically formatted as code, no need for backticks.
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues to make sure this isn't a duplicate
          required: true
        - label: I'm using the latest release
          required: false
